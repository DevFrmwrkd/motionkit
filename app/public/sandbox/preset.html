<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MotionKit Preset Sandbox</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #09090b; }
      #root { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      This file is intentionally static and self-contained. It is loaded by
      SandboxedPresetPlayer inside an iframe with sandbox="allow-scripts"
      (no allow-same-origin), so the script runs as a null origin that
      cannot read parent cookies, localStorage, or DOM.

      The bundle is produced from app/src/sandbox-runtime/entry.tsx by
      app/scripts/build-sandbox.mjs and served from /sandbox/bundle.js.
      It intentionally does NOT go through Next.js bundling — that was
      pulling ws/node:https into the worker bundle and crashing on every
      request to this route.
    -->
    <script>
      // Cache-bust bundle.js using the query param passed to preset.html.
      // Without this, browsers hold onto the old bundle across rebuilds
      // (it's a static file with no fingerprint in its name).
      (function () {
        var v = new URLSearchParams(location.search).get("v") || Date.now();
        var s = document.createElement("script");
        s.src = "./bundle.js?v=" + encodeURIComponent(v);
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
